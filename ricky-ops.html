function fmtFull(d){return d.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric",year:"numeric"})}
function fmtShort(d){return (d.getMonth()+1)+"/"+d.getDate()}

function isTaskDueToday(task, date) {
  const dow = date.getDay();
  if (task.dateOnly) return task.dateOnly === date.toISOString().split("T")[0];
  if (!task.showOn || !task.showOn.includes(dow)) return false;
  if (task.biweekly) {
    const weekNum = Math.floor((date.getTime() - new Date(2026,0,5).getTime()) / (7*24*60*60*1000));
    return ((weekNum + (task.biweeklyOffset || 0)) % 2) === 0;
  }
  return true;
}

function getFreqLabel(task) { return task.freq || "CUSTOM"; }

async function sha256(msg) {
  const buf = new TextEncoder().encode(msg);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// === SHEETS API ===

async function sheetsFetch(params) {
  if (!APPS_SCRIPT_URL) return null;
  try {
    const url = APPS_SCRIPT_URL + "?" + new URLSearchParams(params).toString();
    const res = await fetch(url);
    return JSON.parse(await res.text());
  } catch(e) { console.error("Sheets error:", e); return null; }
}

const sheetsLoad = (dk) => sheetsFetch({ action: "load", date: dk });
const sheetsSave = (dk, checks, notes) => sheetsFetch({ action: "save", date: dk, checks: JSON.stringify(checks), notes: JSON.stringify(notes) });
const sheetsSaveLog = (e) => sheetsFetch({ action: "saveLog", date: e.date, dateKey: e.dateKey, done: e.done, total: e.total, pct: e.pct, time: e.time });
const sheetsLoadLog = async () => { const d = await sheetsFetch({ action: "loadLog" }); return d?.status === "ok" ? d.log : []; };
const sheetsLoadTasks = async () => { const d = await sheetsFetch({ action: "loadTasks" }); return d?.status === "ok" ? (d.tasks || []) : []; };
const sheetsSaveTask = (task) => sheetsFetch({ action: "addTask", task: JSON.stringify(task) });
const sheetsDeleteTask = (id) => sheetsFetch({ action: "deleteTask", taskId: id });

function LoginScreen({ onLogin }) {
  const [pw, setPw] = useState(""); const [err, setErr] = useState(""); const [loading, setLoading] = useState(false);
  const go = async () => {
    if (!pw.trim()) return; setLoading(true); setErr("");
    if (await sha256(pw.trim()) === PASSWORD_HASH) { sessionStorage.setItem("cfs_auth","1"); onLogin(); }
    else { setErr("Wrong password"); setPw(""); }
    setLoading(false);
  };
  return (<div className="login-overlay"><div className="login-box">
    <h1>RICKY — REMOTE OPS</h1><p>CopepodForSale.com — Owner Dashboard</p>
    <div className="login-error">{err}</div>
    <input type="password" placeholder="Enter password..." value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} autoFocus />
    <button onClick={go} disabled={loading}>{loading?"Checking...":"Login"}</button>
  </div></div>);
}

function SyncBadge({status}) {
  if (status==="saving") return <span className="sync-badge sync-saving"><span className="spinner"></span> Saving...</span>;
  if (status==="saved") return <span className="sync-badge sync-ok">☁️ Synced</span>;
  if (status==="error") return <span className="sync-badge sync-err">⚠ Sync failed</span>;
  if (status==="loading") return <span className="sync-badge sync-saving"><span className="spinner"></span> Loading...</span>;
  return <span className="sync-badge sync-off">💾 Local only</span>;
}

function AddTaskModal({ onClose, onSave, currentDate }) {
  const [taskType, setTaskType] = useState("todo");
  const [taskName, setTaskName] = useState("");
  const [taskNotes, setTaskNotes] = useState("");
  const [targetDate, setTargetDate] = useState(currentDate.toISOString().split("T")[0]);
  const [section, setSection] = useState(0);
  const [days, setDays] = useState([1,2,3,4,5]);
  const [saving, setSaving] = useState(false);

  const toggleDay = d => setDays(p => p.includes(d) ? p.filter(x=>x!==d) : [...p,d].sort());

  const go = async () => {
    if (!taskName.trim()) return; setSaving(true);
    const task = { id: "ct_"+Date.now(), task: taskName.trim(), notes: taskNotes.trim(), type: taskType, createdAt: new Date().toISOString() };
    if (taskType === "todo") { task.dateOnly = currentDate.toISOString().split("T")[0]; task.section = -1; task.freq = "TO-DO"; }
    else if (taskType === "date") { task.dateOnly = targetDate; task.section = -1; task.freq = targetDate; }
    else { task.showOn = days; task.section = section; task.freq = days.length===7 ? "DAILY" : days.map(d=>DAYS_SHORT[d]).join(", "); }
    const ok = await onSave(task); setSaving(false); if (ok) onClose();
  };

  return (<div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
    <div className="modal-box">
      <h2>➕ Add Task</h2>
      <div className="modal-field"><label>Task Type</label>
        <select value={taskType} onChange={e=>setTaskType(e.target.value)}>
          <option value="todo">Quick to-do (today only)</option>
          <option value="date">Specific date</option>
          <option value="recurring">Recurring (add to section)</option>
        </select>
      </div>
      <div className="modal-field"><label>Task Name</label>
        <input type="text" value={taskName} onChange={e=>setTaskName(e.target.value)} placeholder="What needs to be done?" autoFocus />
      </div>
      <div className="modal-field"><label>Notes (optional)</label>
        <textarea rows={2} value={taskNotes} onChange={e=>setTaskNotes(e.target.value)} placeholder="Details, context, links..." />
      </div>
      {taskType==="date" && <div className="modal-field"><label>Date</label>
        <input type="date" value={targetDate} onChange={e=>setTargetDate(e.target.value)} />
      </div>}
      {taskType==="recurring" && <>
        <div className="modal-field"><label>Add to Section</label>
          <select value={section} onChange={e=>setSection(Number(e.target.value))}>
            {SECTIONS.map((s,i)=><option key={i} value={i}>{s.title}</option>)}
          </select>
        </div>
        <div className="modal-field"><label>Show on Days</label>
          <div className="day-checks">{DAYS_NAMES.map((n,i)=>
            <label key={i} className="day-check"><input type="checkbox" checked={days.includes(i)} onChange={()=>toggleDay(i)} />{DAYS_SHORT[i]}</label>
          )}</div>
        </div>
      </>}
      <div className="modal-actions">
        <button className="btn-cancel" onClick={onClose}>Cancel</button>
        <button className="btn-primary" onClick={go} disabled={saving||!taskName.trim()}>{saving?"Saving...":"Add Task"}</button>
      </div>
    </div>
  </div>);
}

  const notesRef = useRef(notes); notesRef.current = notes;
  const dk = currentDate.toISOString().split("T")[0];
  const dkRef = useRef(dk); dkRef.current = dk;

  // Build combined sections
  const allSections = React.useMemo(() => {
    const extras = {}; const todos = [];
    customTasks.forEach(ct => {
      const t = { freq: ct.freq||"CUSTOM", task: ct.task, notes: ct.notes||"", freqColor: "#B3E5FC", showOn: ct.showOn||[], dateOnly: ct.dateOnly||null, custom: true, customId: ct.id };
      if (ct.section===-1||ct.section===undefined) todos.push(t);
      else { if(!extras[ct.section]) extras[ct.section]=[]; extras[ct.section].push(t); }
    });
    const combined = SECTIONS.map((sec,i) => ({ ...sec, tasks: [...sec.tasks, ...(extras[i]||[])] }));
    if (todos.length) combined.unshift({ title: "📌 CUSTOM TASKS", color: "#455A64", tasks: todos, isCustom: true });
    return combined;
  }, [customTasks]);

  // Get section index for keys (custom section = -1, others = original SECTIONS index)
  const getSi = (sec, idx) => sec.isCustom ? -1 : (allSections[0]?.isCustom ? idx-1 : idx);
  const getTi = (task, ti) => task.custom ? "c_"+task.customId : ti;

  // Load checks/notes
  useEffect(()=>{
    if (!authed) return; let dead=false;
    (async()=>{
      if (!APPS_SCRIPT_URL){setSyncStatus("offline");return}
      setSyncStatus("loading");
      const data = await sheetsLoad(dk);
      if (dead) return;
      if (data?.status==="ok") {
        if (data.checks) { const p={}; Object.entries(data.checks).forEach(([k,v])=>{p[k]=v===true||v==="true"}); setChecks(prev=>({...prev,...p})); }
        if (data.notes) setNotes(prev=>({...prev,...data.notes}));
        setSyncStatus("saved");
      } else setSyncStatus("error");
    })();
    return ()=>{dead=true};
  },[dk,authed]);

  // Load log + tasks
  useEffect(()=>{
    if (!authed||!APPS_SCRIPT_URL) return;
    sheetsLoadLog().then(l=>{if(l&&l.length)setLog(l)});
    sheetsLoadTasks().then(t=>{if(t)setCustomTasks(t)});
  },[authed]);

  // Debounced save
  const scheduleSync = useCallback(()=>{
    if (!APPS_SCRIPT_URL) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setSyncStatus("saving");
    saveTimer.current = setTimeout(async()=>{
      const d=dkRef.current, ch=checksRef.current, nt=notesRef.current;
      const dc={}, dn={};
      Object.entries(ch).forEach(([k,v])=>{if(k.startsWith(d)&&v)dc[k]=v});
      Object.entries(nt).forEach(([k,v])=>{if(k.startsWith(d)&&v)dn[k]=v});
      const r = await sheetsSave(d,dc,dn);
      setSyncStatus(r?.status==="ok"?"saved":"error");
    },1500);
  },[]);

  const handleAddTask = async(task)=>{
    const r = await sheetsSaveTask(task);
    if (r?.status==="ok") setCustomTasks(p=>[...p,task]);
    return r?.status==="ok";
  };

  const handleDeleteTask = async(id)=>{
    if (!confirm("Delete this custom task?")) return;
    const r = await sheetsDeleteTask(id);
    if (r?.status==="ok") setCustomTasks(p=>p.filter(t=>t.id!==id));
  };

  // Totals
  let totalDue=0, totalDone=0;
  allSections.forEach((s,idx)=>{ const si=getSi(s,idx); s.tasks.forEach((t,ti)=>{
    if(isTaskDueToday(t,currentDate)){totalDue++;if(checks[`${dk}_${si}_${getTi(t,ti)}`])totalDone++}
  })});
  const pct = totalDue>0?Math.round(totalDone/totalDue*100):0;

  const addLog = async()=>{
    const entry={date:fmtFull(currentDate),dateKey:dk,done:totalDone,total:totalDue,pct,time:new Date().toLocaleTimeString()};
    setLog(p=>[entry,...p].slice(0,60));
    if(APPS_SCRIPT_URL){setSyncStatus("saving");const r=await sheetsSaveLog(entry);setSyncStatus(r?.status==="ok"?"saved":"error")}
  };

  const changeDay=n=>{const d=new Date(currentDate);d.setDate(d.getDate()+n);setCurrentDate(d)};

  if (!authed) return <LoginScreen onLogin={()=>setAuthed(true)} />;

  return (
    <div style={{minHeight:"100vh",padding:12,maxWidth:900,margin:"0 auto"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0D47A1,#1565C0,#0D47A1)",padding:"18px 20px",borderRadius:12,marginBottom:14,border:"1px solid #1E88E5",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:"#fff",letterSpacing:0.5}}>RICKY — REMOTE OPS</div>
          <div style={{fontSize:12,color:"#90CAF9",marginTop:2}}>CopepodForSale.com — Owner Dashboard</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <SyncBadge status={syncStatus} />
          <button onClick={()=>{sessionStorage.removeItem("cfs_auth");setAuthed(false)}} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #1E88E5",background:"transparent",color:"#90CAF9",fontSize:11,fontWeight:600,cursor:"pointer"}}>Logout</button>
        </div>
      </div>

      {/* Nav */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:3,background:"#1A2A3A",borderRadius:8,padding:3,border:"1px solid #2E4A62"}}>
          {["today","week","log"].map(m=>(<button key={m} onClick={()=>setView(m)} style={{padding:"7px 16px",borderRadius:6,border:"none",background:view===m?"#1565C0":"transparent",color:view===m?"#fff":"#90CAF9",fontWeight:600,cursor:"pointer",fontSize:13}}>{m[0].toUpperCase()+m.slice(1)}</button>))}
        </div>
        {view!=="log"&&(<div style={{display:"flex",alignItems:"center",gap:6,background:"#1A2A3A",borderRadius:8,padding:"4px 10px",border:"1px solid #2E4A62"}}>
          <button onClick={()=>changeDay(view==="week"?-7:-1)} style={{border:"none",background:"none",cursor:"pointer",fontSize:16,padding:"2px 6px",color:"#90CAF9"}}>◀</button>
          <span style={{fontWeight:600,fontSize:13,minWidth:200,textAlign:"center",color:"#E0E0E0"}}>{view==="today"?fmtFull(currentDate):"Week View"}</span>
          <button onClick={()=>changeDay(view==="week"?7:1)} style={{border:"none",background:"none",cursor:"pointer",fontSize:16,padding:"2px 6px",color:"#90CAF9"}}>▶</button>
          <button onClick={()=>setCurrentDate(new Date())} style={{padding:"4px 10px",borderRadius:4,border:"1px solid #1565C0",background:"transparent",color:"#90CAF9",fontSize:11,fontWeight:600,cursor:"pointer",marginLeft:4}}>Today</button>
        </div>)}
        {view==="today"&&(<div style={{display:"flex",alignItems:"center",gap:8,marginLeft:"auto",flexWrap:"wrap"}}>
          <button onClick={()=>setShowAddTask(true)} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #1565C0",background:"transparent",color:"#90CAF9",fontWeight:700,cursor:"pointer",fontSize:12}}>+ Add Task</button>
          <div style={{background:"#1A2A3A",borderRadius:8,padding:"6px 14px",border:"1px solid #2E4A62",fontSize:13}}>
            <span style={{fontWeight:700,color:pct===100?"#00E676":pct>50?"#FFB300":"#FF5252"}}>{totalDone}/{totalDue}</span>
            <span style={{color:"#78909C",marginLeft:4}}>({pct}%)</span>
          </div>
          <div style={{width:120,height:8,background:"#1A2A3A",borderRadius:4,overflow:"hidden",border:"1px solid #2E4A62"}}>
            <div style={{width:`${pct}%`,height:"100%",background:pct===100?"#00E676":pct>50?"#FFB300":"#FF5252",borderRadius:4,transition:"width 0.3s"}} />
          </div>
          <button onClick={addLog} style={{padding:"6px 12px",borderRadius:6,border:"none",background:"#00E676",color:"#0F1923",fontWeight:700,cursor:"pointer",fontSize:12}}>Save Log</button>
        </div>)}
      </div>

      {showAddTask && <AddTaskModal onClose={()=>setShowAddTask(false)} onSave={handleAddTask} currentDate={currentDate} />}

      {/* TODAY */}
      {view==="today"&&(<div>{allSections.map((sec,idx)=>{
        const si=getSi(sec,idx);
        const due=sec.tasks.filter(t=>isTaskDueToday(t,currentDate));
        if(!due.length)return null;
        const done=due.filter(t=>checks[`${dk}_${si}_${getTi(t,sec.tasks.indexOf(t))}`]).length;
        const allDone=done===due.length&&due.length>0;
        return (<div key={idx} style={{marginBottom:10,borderRadius:10,overflow:"hidden",border:`1px solid ${allDone?"#2E7D32":"#2E4A62"}`}}>
          <div onClick={()=>setExpanded(p=>({...p,[si]:!p[si]}))} style={{background:allDone?"#1B5E20":sec.color,color:"#fff",padding:"11px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"background 0.3s"}}>
            <span style={{fontWeight:700,fontSize:14}}>{sec.title}</span>
            <span style={{fontSize:12,opacity:0.9}}>{allDone?"✅ ":""}{done}/{due.length} {expanded[si]?"▾":"▸"}</span>
          </div>
          {expanded[si]&&due.map(task=>{
            const ti=getTi(task,sec.tasks.indexOf(task));
            const k=`${dk}_${si}_${ti}`;
            const checked=!!checks[k];
            return (<div key={ti} style={{display:"flex",alignItems:"flex-start",padding:"10px 16px",background:checked?"#0A1F12":"#0F1923",borderBottom:"1px solid #1A2A3A",gap:12,transition:"background 0.2s"}}>
              <input type="checkbox" checked={checked} onChange={()=>{setChecks(p=>({...p,[k]:!p[k]}));setTimeout(scheduleSync,50)}} style={{marginTop:4,width:18,height:18}} />
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:4,background:task.custom?"#0277BD":(task.special?"#FF6D00":task.freqColor),color:task.custom||task.special?"#fff":"#333",whiteSpace:"nowrap"}}>{getFreqLabel(task)}</span>
                  <span style={{fontSize:13,fontWeight:600,textDecoration:checked?"line-through":"none",color:checked?"#4CAF50":"#E0E0E0"}}>{task.task}</span>
                  {task.custom&&<button onClick={()=>handleDeleteTask(task.customId)} className="btn-delete">✕</button>}
                </div>
                <div style={{fontSize:11,color:"#78909C",marginTop:3,fontStyle:"italic"}}>{task.notes}</div>
                <input value={notes[k]||""} onChange={e=>{setNotes(p=>({...p,[k]:e.target.value}));setTimeout(scheduleSync,50)}} placeholder="Notes..." style={{marginTop:5,width:"100%",padding:"5px 9px",border:"1px solid #2E4A62",borderRadius:5,fontSize:12,background:"#1A2A3A",color:"#E0E0E0",outline:"none"}} />
              </div>
            </div>);
          })}
        </div>);
      })}</div>)}

      {/* WEEK */}
      {view==="week"&&(<div style={{overflowX:"auto"}}>{SECTIONS.map((sec,si)=>{
        const hasAny=sec.tasks.some(t=>{for(let i=0;i<7;i++){const d=new Date(currentDate);const dow=d.getDay();const diff=dow===0?-6:1-dow;d.setDate(d.getDate()+diff+i);if(isTaskDueToday(t,d))return true}return false});
        if(!hasAny)return null;
        return (<div key={si} style={{marginBottom:10,borderRadius:10,overflow:"hidden",border:"1px solid #2E4A62"}}>
          <div onClick={()=>setExpanded(p=>({...p,[si]:!p[si]}))} style={{background:sec.color,color:"#fff",padding:"10px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontWeight:700,fontSize:13}}>{sec.title}</span><span style={{fontSize:12}}>{expanded[si]?"▾":"▸"}</span>
          </div>
          {expanded[si]&&(<table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:"#1A2A3A"}}>
              <th style={{padding:"6px 10px",textAlign:"left",borderBottom:"1px solid #2E4A62",fontSize:11,color:"#78909C"}}>TASK</th>
              {(()=>{const d=new Date(currentDate);const dow=d.getDay();const diff=dow===0?-6:1-dow;const mon=new Date(d);mon.setDate(d.getDate()+diff);
                return [0,1,2,3,4,5,6].map(i=>{const dt=new Date(mon);dt.setDate(mon.getDate()+i);const isT=dt.toDateString()===new Date().toDateString();
                  return <th key={i} style={{padding:"6px 4px",textAlign:"center",width:48,borderBottom:"1px solid #2E4A62",fontSize:11,color:isT?"#00E676":"#78909C",background:isT?"#0A1F12":"transparent"}}>{DAYS_SHORT[(i+1)%7]}<br/><span style={{fontSize:10}}>{fmtShort(dt)}</span></th>})})()}
            </tr></thead>
            <tbody>{sec.tasks.map((task,ti)=>{
              const d=new Date(currentDate);const dow=d.getDay();const diff=dow===0?-6:1-dow;const mon=new Date(d);mon.setDate(d.getDate()+diff);
              return (<tr key={ti} style={{borderBottom:"1px solid #1A2A3A"}}>
                <td style={{padding:"6px 10px",verticalAlign:"top",maxWidth:250}}><div style={{fontWeight:600,fontSize:12,color:"#E0E0E0"}}>{task.task}</div></td>
                {[0,1,2,3,4,5,6].map(i=>{const dt=new Date(mon);dt.setDate(mon.getDate()+i);const dkey=dt.toISOString().split("T")[0];const due=isTaskDueToday(task,dt);const k2=`${dkey}_${si}_${ti}`;const isT=dt.toDateString()===new Date().toDateString();
                  return (<td key={i} style={{textAlign:"center",padding:4,background:isT?"#0A1F12":"transparent",verticalAlign:"middle"}}>
                    {due?<input type="checkbox" checked={!!checks[k2]} onChange={()=>{setChecks(p=>({...p,[k2]:!p[k2]}));setTimeout(scheduleSync,50)}} style={{width:16,height:16}} />:<span style={{color:"#2E4A62"}}>—</span>}
                  </td>)})}
              </tr>)})}</tbody>
          </table>)}
        </div>);
      })}</div>)}

      {/* LOG */}
      {view==="log"&&(<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:14,fontWeight:700}}>Daily Completion Log</span>
          {log.length>0&&<button onClick={()=>{if(confirm("Clear all?"))setLog([])}} style={{padding:"4px 10px",borderRadius:4,border:"1px solid #FF5252",background:"transparent",color:"#FF5252",fontSize:11,cursor:"pointer"}}>Clear</button>}
        </div>
        {!log.length?<div style={{background:"#1A2A3A",padding:20,borderRadius:8,border:"1px solid #2E4A62",textAlign:"center",color:"#78909C"}}>No entries yet.</div>
        :<table style={{width:"100%",borderCollapse:"collapse",background:"#1A2A3A",borderRadius:8,overflow:"hidden",border:"1px solid #2E4A62",fontSize:13}}>
          <thead><tr style={{background:"#0D47A1"}}><th style={{padding:"10px 14px",textAlign:"left",color:"#fff"}}>Date</th><th style={{padding:"10px 14px",textAlign:"center",color:"#fff"}}>Done</th><th style={{padding:"10px 14px",textAlign:"center",color:"#fff"}}>Due</th><th style={{padding:"10px 14px",textAlign:"center",color:"#fff"}}>%</th><th style={{padding:"10px 14px",textAlign:"right",color:"#fff"}}>Saved</th></tr></thead>
          <tbody>{log.map((e,i)=>(<tr key={i} style={{borderBottom:"1px solid #2E4A62"}}>
            <td style={{padding:"8px 14px",fontWeight:600,color:"#E0E0E0"}}>{e.date}</td>
            <td style={{padding:"8px 14px",textAlign:"center",color:"#B0BEC5"}}>{e.done}</td>
            <td style={{padding:"8px 14px",textAlign:"center",color:"#B0BEC5"}}>{e.total}</td>
            <td style={{padding:"8px 14px",textAlign:"center"}}><span style={{fontWeight:700,color:e.pct===100?"#00E676":e.pct>50?"#FFB300":"#FF5252"}}>{e.pct}%</span></td>
            <td style={{padding:"8px 14px",textAlign:"right",color:"#78909C"}}>{e.time}</td>
          </tr>))}</tbody>
        </table>}
      </div>)}

      {/* Legend */}
      {view!=="log"&&(<div style={{marginTop:16,display:"flex",gap:6,flexWrap:"wrap",fontSize:10}}>
        {[{l:"Manifest (Sun-Tue)",bg:"#FFF3E0",c:"#333"},{l:"Special",bg:"#FF6D00",c:"#fff"},{l:"Mon Payments",bg:"#FBE9E7",c:"#333"},{l:"Growth",bg:"#E8F5E9",c:"#333"},{l:"Weekly",bg:"#CFD8DC",c:"#333"},{l:"Daily",bg:"#E3F2FD",c:"#333"},{l:"Custom",bg:"#0277BD",c:"#fff"}].map(({l,bg,c})=>
          <span key={l} style={{padding:"3px 8px",borderRadius:4,background:bg,color:c,fontWeight:600}}>{l}</span>)}
      </div>)}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
