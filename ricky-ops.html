function fmtFull(d){return d.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric",year:"numeric"})}
function fmtShort(d){return (d.getMonth()+1)+"/"+d.getDate()}

function isTaskDueToday(task, date) {
  const dow = date.getDay();
  if (!task.showOn.includes(dow)) return false;
  if (task.biweekly) {
    const weekNum = Math.floor((date.getTime() - new Date(2026,0,5).getTime()) / (7*24*60*60*1000));
    const offset = task.biweeklyOffset || 0;
    return (weekNum + offset) % 2 === 0;
  }
  return true;
}

function getFreqLabel(task, date) {
  const dow = date.getDay();
  const isWeekend = dow === 0 || dow === 6;
  if (task.weekdayNote && task.weekendNote) {
    return isWeekend ? task.weekendNote : task.weekdayNote;
  }
  return task.freq;
}

// Simple SHA-256 hash using Web Crypto API
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function sheetsLoad(dateKey) {
  if (!APPS_SCRIPT_URL) return null;
  try {
    const url = APPS_SCRIPT_URL + "?action=load&date=" + encodeURIComponent(dateKey);
    const res = await fetch(url, { redirect: "follow" });
    const text = await res.text();
    const data = JSON.parse(text);
    if (data.status === "ok") return data;
    return null;
  } catch (e) {
    console.error("Sheets load error:", e);
    return null;
  }
}

async function sheetsSave(dateKey, checks, notes) {
  if (!APPS_SCRIPT_URL) return false;
  try {
    // Use GET with encoded payload to avoid CORS preflight issues with POST
    const payload = encodeURIComponent(JSON.stringify({ action: "save", date: dateKey, checks, notes }));
    const url = APPS_SCRIPT_URL + "?payload=" + payload;
    const res = await fetch(url, { redirect: "follow" });
    const text = await res.text();
    const data = JSON.parse(text);
    return data.status === "ok";
  } catch (e) {
    console.error("Sheets save error:", e);
    return false;
  }
}

async function sheetsSaveLog(entry) {
  if (!APPS_SCRIPT_URL) return false;
  try {
    const payload = encodeURIComponent(JSON.stringify({ action: "saveLog", ...entry }));
    const url = APPS_SCRIPT_URL + "?payload=" + payload;
    const res = await fetch(url, { redirect: "follow" });
    const text = await res.text();
    const data = JSON.parse(text);
    return data.status === "ok";
  } catch (e) {
    console.error("Sheets log error:", e);
    return false;
  }
}

async function sheetsLoadLog() {
  if (!APPS_SCRIPT_URL) return null;
  try {
    const url = APPS_SCRIPT_URL + "?action=loadLog";
    const res = await fetch(url, { redirect: "follow" });
    const text = await res.text();
    const data = JSON.parse(text);
    if (data.status === "ok") return data.log;
    return null;
  } catch (e) {
    console.error("Sheets log load error:", e);
    return null;
  }
}

function LoginScreen({ onLogin }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    if (!pw.trim()) return;
    setLoading(true);
    setErr("");
    const hash = await sha256(pw.trim());
    if (hash === PASSWORD_HASH) {
      sessionStorage.setItem("cfs_auth", "1");
      onLogin();
    } else {
      setErr("Wrong password");
      setPw("");
    }
    setLoading(false);
  };

  return (
    <div className="login-overlay">
      <div className="login-box">
        <h1>RICKY — REMOTE OPS</h1>
        <p>CopepodForSale.com — Owner Dashboard</p>
        <div className="login-error">{err}</div>

        />
        <button onClick={handleSubmit} disabled={loading}>
          {loading ? "Checking..." : "Login"}
        </button>
      </div>
    </div>
  );
}

function SyncBadge({ status }) {
  if (status === "saving") return <span className="sync-badge sync-saving"><span className="spinner"></span> Saving...</span>;
  if (status === "saved") return <span className="sync-badge sync-ok">☁️ Synced</span>;
  if (status === "error") return <span className="sync-badge sync-err">⚠ Sync failed</span>;
  if (status === "loading") return <span className="sync-badge sync-saving"><span className="spinner"></span> Loading...</span>;
  return <span className="sync-badge sync-off">💾 Local only</span>;
}

      </div>

      {/* Nav */}
      <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
        <div style={{ display: "flex", gap: 3, background: "#1A2A3A", borderRadius: 8, padding: 3, border: "1px solid #2E4A62" }}>
          {["today", "week", "log"].map(m => (
            <button key={m} onClick={() => setView(m)} style={{ padding: "7px 16px", borderRadius: 6, border: "none", background: view === m ? "#1565C0" : "transparent", color: view === m ? "#fff" : "#90CAF9", fontWeight: 600, cursor: "pointer", fontSize: 13 }}>{m.charAt(0).toUpperCase() + m.slice(1)}</button>
          ))}
        </div>

        {view !== "log" && (
          <div style={{ display: "flex", alignItems: "center", gap: 6, background: "#1A2A3A", borderRadius: 8, padding: "4px 10px", border: "1px solid #2E4A62" }}>
            <button onClick={() => changeDay(view === "week" ? -7 : -1)} style={{ border: "none", background: "none", cursor: "pointer", fontSize: 16, padding: "2px 6px", color: "#90CAF9" }}>◀</button>
            <span style={{ fontWeight: 600, fontSize: 13, minWidth: 200, textAlign: "center", color: "#E0E0E0" }}>
              {view === "today" ? fmtFull(currentDate) : "Week View"}
            </span>
            <button onClick={() => changeDay(view === "week" ? 7 : 1)} style={{ border: "none", background: "none", cursor: "pointer", fontSize: 16, padding: "2px 6px", color: "#90CAF9" }}>▶</button>
            <button onClick={() => setCurrentDate(new Date())} style={{ padding: "4px 10px", borderRadius: 4, border: "1px solid #1565C0", background: "transparent", color: "#90CAF9", fontSize: 11, fontWeight: 600, cursor: "pointer", marginLeft: 4 }}>Today</button>
          </div>
        )}

        {view === "today" && (
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginLeft: "auto", flexWrap: "wrap" }}>
            <div style={{ background: "#1A2A3A", borderRadius: 8, padding: "6px 14px", border: "1px solid #2E4A62", fontSize: 13 }}>
              <span style={{ fontWeight: 700, color: pct === 100 ? "#00E676" : pct > 50 ? "#FFB300" : "#FF5252" }}>{totalDone}/{totalDue}</span>
              <span style={{ color: "#78909C", marginLeft: 4 }}>({pct}%)</span>
            </div>
            <div style={{ width: 120, height: 8, background: "#1A2A3A", borderRadius: 4, overflow: "hidden", border: "1px solid #2E4A62" }}>
              <div style={{ width: `${pct}%`, height: "100%", background: pct === 100 ? "#00E676" : pct > 50 ? "#FFB300" : "#FF5252", borderRadius: 4, transition: "width 0.3s" }} />
            </div>
            <button onClick={addLog} style={{ padding: "6px 12px", borderRadius: 6, border: "none", background: "#00E676", color: "#0F1923", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>Save Log</button>
          </div>
        )}
      </div>

      {/* TODAY VIEW */}
      {view === "today" && (
        <div>
          {SECTIONS.map((sec, si) => {
            const due = sec.tasks.filter(t => isTaskDueToday(t, currentDate));
            if (!due.length) return null;
            const done = due.filter(t => checks[`${dk}_${si}_${sec.tasks.indexOf(t)}`]).length;
            const allDone = done === due.length && due.length > 0;
            return (
              <div key={si} style={{ marginBottom: 10, borderRadius: 10, overflow: "hidden", border: `1px solid ${allDone ? "#2E7D32" : "#2E4A62"}` }}>
                <div onClick={() => setExpanded(p => ({ ...p, [si]: !p[si] }))} style={{ background: allDone ? "#1B5E20" : sec.color, color: "#fff", padding: "11px 16px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", transition: "background 0.3s" }}>
                  <span style={{ fontWeight: 700, fontSize: 14 }}>{sec.title}</span>
                  <span style={{ fontSize: 12, opacity: 0.9 }}>{allDone ? "✅ " : ""}{done}/{due.length} {expanded[si] ? "▾" : "▸"}</span>
                </div>
                {expanded[si] && due.map(task => {
                  const ti = sec.tasks.indexOf(task);
                  const k = `${dk}_${si}_${ti}`;
                  const checked = !!checks[k];
                  const noteVal = notes[k] || "";
                  const freqLabel = getFreqLabel(task, currentDate);
                  return (
                    <div key={ti} style={{ display: "flex", alignItems: "flex-start", padding: "10px 16px", background: checked ? "#0A1F12" : "#0F1923", borderBottom: "1px solid #1A2A3A", gap: 12, transition: "background 0.2s" }}>
                      <input type="checkbox" checked={checked} onChange={() => toggle(si, ti)} style={{ marginTop: 4, width: 18, height: 18 }} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                          <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 4, background: task.special ? "#FF6D00" : task.freqColor, color: task.special ? "#fff" : "#333", whiteSpace: "nowrap" }}>{freqLabel}</span>
                          <span style={{ fontSize: 13, fontWeight: 600, textDecoration: checked ? "line-through" : "none", color: checked ? "#4CAF50" : "#E0E0E0" }}>{task.task}</span>
                        </div>
                        <div style={{ fontSize: 11, color: "#78909C", marginTop: 3, fontStyle: "italic" }}>{task.notes}</div>
                        <input value={noteVal} onChange={e => updateNote(si, ti, e.target.value)} placeholder="Notes..." style={{ marginTop: 5, width: "100%", padding: "5px 9px", border: "1px solid #2E4A62", borderRadius: 5, fontSize: 12, background: "#1A2A3A", color: "#E0E0E0", outline: "none" }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {/* WEEK VIEW */}
      {view === "week" && (
        <div style={{ overflowX: "auto" }}>
          {SECTIONS.map((sec, si) => {
            const hasAnyThisWeek = sec.tasks.some(t => {
              for (let i = 0; i < 7; i++) { const d = new Date(currentDate); const dow = d.getDay(); const diff = dow === 0 ? -6 : 1 - dow; d.setDate(d.getDate() + diff + i); if (isTaskDueToday(t, d)) return true } return false;
            });
            if (!hasAnyThisWeek) return null;
            return (
              <div key={si} style={{ marginBottom: 10, borderRadius: 10, overflow: "hidden", border: "1px solid #2E4A62" }}>
                <div onClick={() => setExpanded(p => ({ ...p, [si]: !p[si] }))} style={{ background: sec.color, color: "#fff", padding: "10px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between" }}>
                  <span style={{ fontWeight: 700, fontSize: 13 }}>{sec.title}</span>
                  <span style={{ fontSize: 12 }}>{expanded[si] ? "▾" : "▸"}</span>
                </div>
                {expanded[si] && (
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr style={{ background: "#1A2A3A" }}>
                        <th style={{ padding: "6px 10px", textAlign: "left", borderBottom: "1px solid #2E4A62", fontSize: 11, color: "#78909C" }}>TASK</th>
                        {(() => {
                          const d = new Date(currentDate); const dow = d.getDay(); const diff = dow === 0 ? -6 : 1 - dow;
                          const mon = new Date(d); mon.setDate(d.getDate() + diff);
                          return [0, 1, 2, 3, 4, 5, 6].map(i => {
                            const dt = new Date(mon); dt.setDate(mon.getDate() + i);
                            const isToday = dt.toDateString() === new Date().toDateString();
                            return <th key={i} style={{ padding: "6px 4px", textAlign: "center", width: 48, borderBottom: "1px solid #2E4A62", fontSize: 11, color: isToday ? "#00E676" : "#78909C", background: isToday ? "#0A1F12" : "transparent" }}>{DAYS_SHORT[(i + 1) % 7]}<br /><span style={{ fontSize: 10 }}>{fmtShort(dt)}</span></th>
                          });
                        })()}
                      </tr>
                    </thead>
                    <tbody>
                      {sec.tasks.map((task, ti) => {
                        const d = new Date(currentDate); const dow = d.getDay(); const diff = dow === 0 ? -6 : 1 - dow;
                        const mon = new Date(d); mon.setDate(d.getDate() + diff);
                        return (
                          <tr key={ti} style={{ borderBottom: "1px solid #1A2A3A" }}>
                            <td style={{ padding: "6px 10px", color: "#B0BEC5", verticalAlign: "top", maxWidth: 250 }}>
                              <div style={{ fontWeight: 600, fontSize: 12, color: "#E0E0E0" }}>{task.task}</div>
                            </td>
                            {[0, 1, 2, 3, 4, 5, 6].map(i => {
                              const dt = new Date(mon); dt.setDate(mon.getDate() + i);
                              const dkey = dt.toISOString().split("T")[0];
                              const due = isTaskDueToday(task, dt);
                              const k2 = `${dkey}_${si}_${ti}`;
                              const isToday = dt.toDateString() === new Date().toDateString();
                              return (
                                <td key={i} style={{ textAlign: "center", padding: 4, background: isToday ? "#0A1F12" : "transparent", verticalAlign: "middle" }}>
                                  {due ? <input type="checkbox" checked={!!checks[k2]} onChange={() => { setChecks(p => ({ ...p, [k2]: !p[k2] })); setTimeout(scheduleSync, 50); }} style={{ width: 16, height: 16 }} /> : <span style={{ color: "#2E4A62" }}>—</span>}
                                </td>
                              );
                            })}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* LOG VIEW */}
      {view === "log" && (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontSize: 14, fontWeight: 700, color: "#E0E0E0" }}>Daily Completion Log</span>
            {log.length > 0 && <button onClick={() => { if (confirm("Clear all log entries?")) setLog([]) }} style={{ padding: "4px 10px", borderRadius: 4, border: "1px solid #FF5252", background: "transparent", color: "#FF5252", fontSize: 11, cursor: "pointer" }}>Clear</button>}
          </div>
          {!log.length ? (
            <div style={{ background: "#1A2A3A", padding: 20, borderRadius: 8, border: "1px solid #2E4A62", textAlign: "center", color: "#78909C" }}>No entries yet. Use "Save Log" in Today view.</div>
          ) : (
            <table style={{ width: "100%", borderCollapse: "collapse", background: "#1A2A3A", borderRadius: 8, overflow: "hidden", border: "1px solid #2E4A62", fontSize: 13 }}>
              <thead>
                <tr style={{ background: "#0D47A1" }}>
                  <th style={{ padding: "10px 14px", textAlign: "left", color: "#fff" }}>Date</th>
                  <th style={{ padding: "10px 14px", textAlign: "center", color: "#fff" }}>Done</th>
                  <th style={{ padding: "10px 14px", textAlign: "center", color: "#fff" }}>Due</th>
                  <th style={{ padding: "10px 14px", textAlign: "center", color: "#fff" }}>%</th>
                  <th style={{ padding: "10px 14px", textAlign: "right", color: "#fff" }}>Saved</th>
                </tr>
              </thead>
              <tbody>
                {log.map((e, i) => (
                  <tr key={i} style={{ borderBottom: "1px solid #2E4A62" }}>
                    <td style={{ padding: "8px 14px", fontWeight: 600, color: "#E0E0E0" }}>{e.date}</td>
                    <td style={{ padding: "8px 14px", textAlign: "center", color: "#B0BEC5" }}>{e.done}</td>
                    <td style={{ padding: "8px 14px", textAlign: "center", color: "#B0BEC5" }}>{e.total}</td>
                    <td style={{ padding: "8px 14px", textAlign: "center" }}><span style={{ fontWeight: 700, color: e.pct === 100 ? "#00E676" : e.pct > 50 ? "#FFB300" : "#FF5252" }}>{e.pct}%</span></td>
                    <td style={{ padding: "8px 14px", textAlign: "right", color: "#78909C" }}>{e.time}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* Legend */}
      {view !== "log" && (
        <div style={{ marginTop: 16, display: "flex", gap: 6, flexWrap: "wrap", fontSize: 10 }}>
          {[{ l: "Manifest Days (Sun-Tue)", bg: "#FFF3E0", c: "#333" }, { l: "Tues Special", bg: "#FF6D00", c: "#fff" }, { l: "Mon Payments", bg: "#FBE9E7", c: "#333" }, { l: "Thu-Sun Growth", bg: "#E8F5E9", c: "#333" }, { l: "Weekly", bg: "#CFD8DC", c: "#333" }, { l: "Daily", bg: "#E3F2FD", c: "#333" }].map(({ l, bg, c }) => (
            <span key={l} style={{ padding: "3px 8px", borderRadius: 4, background: bg, color: c, fontWeight: 600 }}>{l}</span>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
